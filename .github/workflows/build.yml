name: build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Note on CI compile verification:
#   SAP ADT JARs are not redistributable, so we cannot compile the plugin in a
#   public GitHub runner without first installing Eclipse-for-ABAP via SAP's
#   update site (which is rate-limited and version-volatile). For v0.1 we run
#   a lightweight static-validation pass instead. Full builds happen locally;
#   the resulting JAR is attached to GitHub Releases for users to download.
#
#   Tracked as a follow-up in docs/plans/03-publishing.md (option "c": stub the
#   imports for CI compilation only).

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Validate Java source structure
        run: |
          set -e
          echo "--- Java files present ---"
          find src -name '*.java' | sort
          echo ""
          echo "--- javac syntax check (no link) ---"
          # -proc:none avoids running annotation processors; -d /tmp avoids writing
          # We're checking parse + scope, not full link. This catches gross errors.
          mkdir -p /tmp/javac-validate
          find src -name '*.java' -print0 | xargs -0 javac -proc:none -d /tmp/javac-validate -implicit:none 2>&1 | head -30 || true
          # Continue regardless — some errors are expected without ADT on classpath
          echo "(linkage errors are expected; structural errors would have failed above)"

      - name: Validate plugin.xml
        run: |
          set -e
          xmllint --noout plugin.xml
          echo "plugin.xml is well-formed."
          # Confirm every class referenced exists
          for cls in $(grep -oE 'class="[^"]+"' plugin.xml | sed 's/class="//; s/"//' | grep '^com.arc1'); do
              path="src/${cls//.//}.java"
              if [[ -f "$path" ]]; then
                  echo "  $cls -> $path ✓"
              else
                  echo "  $cls -> $path MISSING" >&2
                  exit 1
              fi
          done

      - name: Validate MANIFEST.MF
        run: |
          # OSGi manifest: must have Bundle-SymbolicName, Bundle-Version, Bundle-Activator
          required="Bundle-SymbolicName Bundle-Version Bundle-Activator Require-Bundle"
          for h in $required; do
              if ! grep -q "^${h}:" META-INF/MANIFEST.MF; then
                  echo "MANIFEST.MF missing required header: $h" >&2
                  exit 1
              fi
          done
          echo "MANIFEST.MF passes structural checks."
          grep -E "^(Bundle-SymbolicName|Bundle-Version|Bundle-Activator):" META-INF/MANIFEST.MF

      - name: Validate scripts are executable
        run: |
          for s in build.sh scripts/smoke-test.sh scripts/finalize-readme.sh; do
              if [[ ! -x "$s" ]]; then
                  echo "Script not executable: $s" >&2
                  exit 1
              fi
              bash -n "$s" || { echo "Shell syntax error: $s" >&2; exit 1; }
          done
          echo "All shell scripts pass bash -n syntax check."
