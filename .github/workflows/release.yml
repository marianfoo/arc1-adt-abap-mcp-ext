name: release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Restore Eclipse install
        uses: actions/cache@v4
        with:
          path: eclipse
          key: eclipse-for-abap-3.58-${{ runner.os }}

      - name: Install Eclipse if cache miss
        run: |
          if [[ ! -d eclipse/eclipse ]]; then
            mkdir -p eclipse && cd eclipse
            wget -q https://www.eclipse.org/downloads/download.php?file=/technology/epp/downloads/release/2025-09/R/eclipse-java-2025-09-R-linux-gtk-x86_64.tar.gz -O eclipse.tar.gz
            tar -xzf eclipse.tar.gz && rm eclipse.tar.gz
            ./eclipse/eclipse -application org.eclipse.equinox.p2.director \
              -repository https://tools.hana.ondemand.com/2025-09 \
              -installIU com.sap.adt.feature.feature.group \
              -destination $PWD/eclipse \
              -profile SDKProfile -noSplash || true
          fi

      - name: Build
        run: |
          P2_DIR=$(find $HOME -maxdepth 5 -type d -name "plugins" -path "*/.p2/*" | head -1)
          [[ -n "$P2_DIR" ]] && sed -i "s|\$HOME/.p2/pool/plugins|$P2_DIR|g" build.sh
          # Sync version in MANIFEST.MF to the git tag (e.g. v0.2.0 -> 0.2.0)
          VERSION=${GITHUB_REF_NAME#v}
          sed -i "s/^Bundle-Version: .*/Bundle-Version: $VERSION/" META-INF/MANIFEST.MF
          ./build.sh
          # Rename JAR to match tag version
          mv com.arc1.mcp_0.1.0.jar com.arc1.mcp_${VERSION}.jar 2>/dev/null || true

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: com.arc1.mcp_*.jar
          generate_release_notes: true
          body: |
            ## Install

            Drop the JAR into your Eclipse install's `dropins/` folder and restart Eclipse with `-clean`.

            See the [README](https://github.com/${{ github.repository }}/blob/main/README.md) for full setup including `eclipse.ini` configuration.
