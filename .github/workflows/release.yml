name: release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

# Note: this workflow does NOT build the plugin in CI (see build.yml for why).
# It creates an empty GitHub Release on tag push so the maintainer can attach
# the locally-built JAR with `gh release upload v<X.Y.Z> com.arc1.mcp_<X.Y.Z>.jar`.

jobs:
  create-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Create draft release
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          generate_release_notes: true
          body: |
            ## Install

            Download the `com.arc1.mcp_<version>.jar` asset below, drop it into your Eclipse install's `dropins/` folder, and restart Eclipse with `-clean`. See the [README](https://github.com/${{ github.repository }}/blob/main/README.md) for full setup including the `eclipse.ini` configuration.

            ## Verify

            ```bash
            ./scripts/smoke-test.sh <your-destination-id>
            ```

            ## Notes

            The plugin JAR is built locally (SAP ADT JARs aren't redistributable, so no public CI build for v0.1). The maintainer uploads the JAR with `gh release upload` after each tag push. If the JAR is missing from this release, please open an issue.
